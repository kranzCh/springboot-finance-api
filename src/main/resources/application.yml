server:
  port: 8080

spring:
  application:
    name: finance-api
  datasource:
    url: jdbc:postgresql://localhost:5432/finance_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-use-a-256-bit-secret-key}
      expiration-ms: 3600000       # 1 hour
      refresh-expiration-ms: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.finance.api: INFO
